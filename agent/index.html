<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="The Daily Reflection Tree — A deterministic end-of-day reflection tool that guides you through honest self-examination across agency, contribution, and awareness.">
    <title>The Daily Reflection Tree</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,500;1,500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <!-- Ambient background -->
        <div class="ambient-bg">
            <div class="orb orb-1"></div>
            <div class="orb orb-2"></div>
            <div class="orb orb-3"></div>
        </div>

        <!-- Progress bar -->
        <header id="progress-bar" class="progress-bar hidden">
            <div class="progress-track">
                <div class="progress-segment" id="seg-axis1">
                    <span class="progress-label">Agency</span>
                    <div class="progress-fill"></div>
                </div>
                <div class="progress-segment" id="seg-axis2">
                    <span class="progress-label">Contribution</span>
                    <div class="progress-fill"></div>
                </div>
                <div class="progress-segment" id="seg-axis3">
                    <span class="progress-label">Radius</span>
                    <div class="progress-fill"></div>
                </div>
            </div>
        </header>

        <!-- Main content area -->
        <main id="content-area" class="content-area">
            <!-- Loading state -->
            <div id="loading" class="loading-screen">
                <div class="loading-icon">🌙</div>
                <p class="loading-text">Preparing your reflection space...</p>
            </div>
        </main>

        <!-- Footer with session info -->
        <footer id="session-footer" class="session-footer hidden">
            <span id="session-date"></span>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
